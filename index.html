<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Invoice Generator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- QRCode Generator -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                charcoal: '#121214',
                cardDark: '#1C1C1E',
                cream: '#FAF8F2',
                creamHover: '#FAF6EE',
                coral: '#E65F2B',
                coralHover: '#DE521D',
                yellow: '#F4B33E',
                borderCream: '#E5DDCB',
                textDark: '#121214',
                textGray: '#706E65',
              }
            },
            fontFamily: {
              heading: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              signature: ['Caveat', 'cursive'],
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <style type="text/css">
      /* Custom Print Styles */
      @media print {
        body {
          background-color: #FAF8F2 !important;
          color: #121214 !important;
        }
        .no-print {
          display: none !important;
        }
        .print-exact {
          print-color-adjust: exact !important;
          -webkit-print-color-adjust: exact !important;
        }
        #invoice-sheet {
          box-shadow: none !important;
          margin: 0 !important;
          border: none !important;
          border-radius: 0 !important;
          width: 100% !important;
          height: auto !important;
          min-height: auto !important;
        }
      }
      .font-signature {
        font-family: 'Caveat', cursive;
      }
      .print-exact {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    </style>
  </head>
  <body class="bg-brand-charcoal text-[#FAF8F2] antialiased min-h-screen">
    
    <!-- Dashboard View Container -->
    <div id="dashboard-view" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 hidden">
      <div class="flex justify-between items-center mb-10">
        <div>
          <h1 class="text-4xl font-heading font-extrabold text-[#FAF8F2] tracking-tight">Invoices</h1>
          <p class="text-[#A1A1AA] mt-1.5 text-sm">Manage your premium client invoices</p>
        </div>
        <button id="btn-new-invoice" class="flex items-center gap-2 bg-brand-coral text-white px-6 py-3 rounded-2xl hover:bg-brand-coralHover hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_4px_20px_rgba(230,95,43,0.3)] font-heading font-bold text-sm cursor-pointer">
          <i data-lucide="plus" class="w-4 h-4 stroke-[3]"></i>
          <span>New Invoice</span>
        </button>
      </div>

      <!-- Empty State -->
      <div id="dashboard-empty" class="bg-brand-cardDark rounded-3xl border border-[#2E2E33] border-dashed p-16 text-center shadow-xl hidden">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-coral/10 border border-brand-coral/20 mb-6">
          <i data-lucide="file-text" class="w-8 h-8 text-brand-coral"></i>
        </div>
        <h3 class="text-xl font-heading font-semibold text-[#FAF8F2]">No invoices yet</h3>
        <p class="text-[#A1A1AA] mt-2 mb-8 text-sm max-w-sm mx-auto">Create your first invoice to get started and experience the premium design.</p>
        <button id="btn-empty-create" class="inline-flex items-center gap-2 bg-[#FAF8F2] text-brand-textDark px-6 py-3 rounded-2xl hover:bg-[#FAF8F2]/90 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-md text-sm font-bold font-heading cursor-pointer">
          <i data-lucide="plus" class="w-4 h-4 stroke-[3]"></i>
          Create Invoice
        </button>
      </div>

      <!-- Invoices Table Container -->
      <div id="dashboard-table-wrapper" class="bg-brand-cream rounded-3xl overflow-hidden shadow-2xl border border-brand-cream/10 p-2 hidden">
        <table class="min-w-full divide-y divide-brand-borderCream">
          <thead>
            <tr class="bg-brand-cardDark text-[#FAF8F2]">
              <th class="px-6 py-5 text-left text-xs font-heading font-bold uppercase tracking-widest rounded-l-2xl">Invoice No.</th>
              <th class="px-6 py-5 text-left text-xs font-heading font-bold uppercase tracking-widest">Client</th>
              <th class="px-6 py-5 text-left text-xs font-heading font-bold uppercase tracking-widest">Date</th>
              <th class="px-6 py-5 text-right text-xs font-heading font-bold uppercase tracking-widest">Amount</th>
              <th class="px-6 py-5 text-right text-xs font-heading font-bold uppercase tracking-widest rounded-r-2xl">Actions</th>
            </tr>
          </thead>
          <tbody id="invoices-list-body" class="bg-brand-cream divide-y divide-brand-borderCream">
            <!-- Dynamic rows will be injected here -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Editor View Container -->
    <div id="editor-view" class="flex flex-col h-screen overflow-hidden bg-brand-charcoal hidden">
      <!-- Editor Header -->
      <header class="flex-shrink-0 bg-brand-cardDark border-b border-[#2E2E33] h-20 flex items-center justify-between px-4 sm:px-8 z-10 shadow-lg">
        <div class="flex items-center gap-3 sm:gap-5">
          <button id="btn-editor-back" class="p-2.5 text-[#A1A1AA] hover:text-[#FAF8F2] hover:bg-[#FAF8F2]/10 rounded-xl transition-all cursor-pointer">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </button>
          <div class="h-6 w-px bg-[#2E2E33] hidden sm:block"></div>
          <h2 id="editor-invoice-number" class="text-lg font-heading font-bold text-[#FAF8F2] hidden sm:block tracking-wide">
            INVOICE-XXXX
          </h2>
        </div>
        <div class="flex items-center gap-3 sm:gap-4">
          <button id="btn-save-draft" class="flex items-center gap-2 bg-[#FAF8F2]/5 border border-[#FAF8F2]/10 text-[#FAF8F2] px-4 py-2.5 rounded-xl hover:bg-[#FAF8F2]/10 transition-all font-heading font-semibold text-sm cursor-pointer">
            <i data-lucide="save" class="w-4 h-4 text-[#A1A1AA]"></i>
            <span class="hidden sm:inline">Save Draft</span>
          </button>
          <button id="btn-print" class="flex items-center gap-2 bg-[#FAF8F2]/5 border border-[#FAF8F2]/10 text-[#FAF8F2] px-4 py-2.5 rounded-xl hover:bg-[#FAF8F2]/10 transition-all font-heading font-semibold text-sm cursor-pointer">
            <i data-lucide="printer" class="w-4 h-4 text-[#A1A1AA]"></i>
            <span class="hidden lg:inline">Print</span>
          </button>
          <button id="btn-export-pdf" class="flex items-center gap-2 bg-brand-coral text-white px-5 py-2.5 rounded-xl hover:bg-brand-coralHover hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_4px_15px_rgba(230,95,43,0.3)] font-heading font-bold text-sm cursor-pointer">
            <i data-lucide="download" class="w-4 h-4 stroke-[2.5]"></i>
            <span class="hidden lg:inline">Export PDF</span>
          </button>
        </div>
      </header>

      <!-- Workspace -->
      <div class="flex-1 flex overflow-hidden">
        <!-- Left Column: Builder Form -->
        <div class="w-full lg:w-[450px] xl:w-[500px] flex-shrink-0 border-r border-[#2E2E33] bg-brand-charcoal overflow-y-auto" id="builder-form-container">
          <!-- Form HTML will be dynamically injected or structured here -->
        </div>

        <!-- Right Column: Live Sheet Preview -->
        <div class="flex-1 overflow-y-auto bg-brand-charcoal p-4 sm:p-10 flex justify-center items-start">
          <div class="w-full max-w-[210mm] bg-brand-cream shadow-[0_25px_60px_rgba(0,0,0,0.5)] rounded-3xl overflow-hidden scale-100 origin-top" id="preview-wrapper">
            <!-- Dynamic InvoicePreview sheet will render here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Main JavaScript Logic -->
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
